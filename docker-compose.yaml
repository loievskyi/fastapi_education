x-service-backend-common: &service-backend-common
  build:
    dockerfile: Dockerfile
  restart: always
  init: true
  stop_grace_period: 2s
  env_file:
    - .env
  volumes:
    - ./backend/app:/app:ro
  command:
    - uvicorn
    - main:app
    - --host=0.0.0.0
    - --port=12321
    - --reload
  networks:
    - main_network


services:
  documentation:
    image: squidfunk/mkdocs-material:latest
    container_name: mkdocs
    hostname: mkdocs
    command: serve --dev-addr=0.0.0.0:8010 --watch-theme
    restart: unless-stopped
    ports:
      - "8010:8010"
    volumes:
      - ./documentation:/docs:ro
    profiles:
      - docs

  backend1:
    <<: *service-backend-common
    container_name: backend1
    hostname: backend1
    ports:
      - "12345:12321"

  backend2:
    <<: *service-backend-common
    container_name: backend2
    hostname: backend2
    ports:
      - "12346:1231"
      - "12346:12321"

networks:
  main_network:
    driver: bridge
